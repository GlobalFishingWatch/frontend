name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  integration-tests:
    name: Run Integration Tests
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Notify the developer about integration tests running
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          message: |
            ## ⏳ Integration tests are running...

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and set Yarn version
        run: |
          corepack enable
          yarn set version 4.12.0

      - name: Restore yarn cache
        id: yarn-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
            .nx/cache
          key: yarn-${{ github.head_ref }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ github.head_ref }}-
            yarn-${{ github.base_ref }}-
            yarn-

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable --inline-builds

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run affected tests
        id: run-tests
        continue-on-error: true
        run: |
          set -euo pipefail
          yarn nx affected --target=test | tee test-output.txt
        env:
          NX_BASE: origin/${{ github.event.pull_request.base.ref }}
          NX_HEAD: HEAD
          NEXT_PUBLIC_API_GATEWAY: https://gateway.api.${{ github.event.pull_request.base.ref == 'main' && 'staging' || 'dev' }}.globalfishingwatch.org
          NEXT_PUBLIC_WORKSPACE_ENV: development
          CI: '1'
          NX_DAEMON: 'false'
          NODE_OPTIONS: --trace-warnings
          TEST_CHROME_ONLY: 'true'
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Parse test results
        if: always()
        run: |
          echo "<!-- integration-tests-comment -->" > summary.md
          sed 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\x1b\[[?][0-9]*[a-zA-Z]//g' test-output.txt | awk '
            function flush() {
              if (target != "" && is_test) {
                status = (failed ? "❌" : "✅")
                printf "<details>\n<summary>%s %s</summary>\n\n```\n%s\n```\n\n</details>\n\n", status, target, output
                if (failed) fail_count++; else pass_count++
              }
            }
            BEGIN { print "## Test Results\n" }
            /^> nx run /{
              flush()
              target = $4
              is_test = ($4 ~ /:test$/)
              output = ""
              failed = 1
            }
            is_test {
              output = (output == "" ? $0 : output "\n" $0)
              if (/Tests +[0-9]+ passed/ && !/failed/) failed = 0
            }
            END {
              flush()
              if (pass_count == 0 && fail_count == 0) {
                printf "---\n**Summary:** No tests were run\n"
              } else {
                printf "---\n**Summary:** %d passed, %d failed\n", pass_count, fail_count
              }
            }
          ' >> summary.md

      - name: Comment on PR with test results
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: summary.md

      - name: Upload test traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-traces
          path: apps/fishing-map/test/integration/__traces__

      - name: Save yarn cache
        if: always() && steps.yarn-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
            .nx/cache
          key: ${{ steps.yarn-cache.outputs.cache-primary-key }}
