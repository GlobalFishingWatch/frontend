name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  integration-tests:
    name: Run Integration Tests
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and set Yarn version
        run: |
          corepack enable
          yarn set version 4.12.0

      - name: Restore yarn cache
        id: yarn-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
            .nx/cache
          key: yarn-${{ github.head_ref }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ github.head_ref }}-
            yarn-${{ github.base_ref }}-
            yarn-

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable --inline-builds

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run affected tests
        run: yarn nx test api-client
        env:
          NX_BASE: origin/${{ github.event.pull_request.base.ref }}
          NX_HEAD: HEAD
          NEXT_PUBLIC_API_GATEWAY: https://gateway.api.${{ github.event.pull_request.base.ref == 'main' && 'staging' || 'dev' }}.globalfishingwatch.org
          NEXT_PUBLIC_WORKSPACE_ENV: development
          CI: '1'
          NX_DAEMON: 'false'
          NODE_OPTIONS: --trace-warnings
          TEST_CHROME_ONLY: 'true'
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          
      - name: Save yarn cache
        if: always() && steps.yarn-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
            .nx/cache
          key: ${{ steps.yarn-cache.outputs.cache-primary-key }}
