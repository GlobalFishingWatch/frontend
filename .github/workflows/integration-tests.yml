name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Run Integration Tests
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Notify the developer about integration tests running
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          message: |
            ## ⏳ Integration tests are running...
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=100

      # --- Setting up dependencies and cache ---------------------------------

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.58.2
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # --- Running tests -----------------------------------------------------

      - name: Run affected tests
        id: run-tests
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm exec nx affected \
            --target=test \
            --parallel=4 \
            --output-style=stream \
            --base=origin/${{ github.event.pull_request.base.ref }} \
            --head=HEAD 2>&1 \
            | tee test-output.txt
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          VITE_API_GATEWAY: https://gateway.api.${{ github.event.pull_request.base.ref == 'main' && 'staging' || 'dev' }}.globalfishingwatch.org
          VITE_WORKSPACE_ENV: development
          CI: '1'
          NX_DAEMON: 'false'
          NODE_OPTIONS: --trace-warnings
          TEST_CHROME_ONLY: 'true'
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Parse test results
        if: always()
        run: |
          sed 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\x1b\[[?][0-9]*[a-zA-Z]//g' test-output.txt | awk '
            # With --parallel and --output-style=stream, Nx prefixes each line as:
            #   "project-name: <log line>"
            # We track which targets are :test targets, accumulate output per-project
            # using the prefix, and detect pass/fail per project.
            /^> nx run / {
              # $4 is e.g. "fishing-map:test" — split to get just the project name
              split($4, parts, ":")
              proj = parts[1]
              if (parts[2] == "test") {
                is_test_target[proj] = 1
                failed[proj] = 1
              }
            }
            {
              # Match lines prefixed by a known project: "proj-name: ..."
              if (match($0, /^([a-zA-Z0-9_-]+): /, arr)) {
                proj = arr[1]
                if (is_test_target[proj]) {
                  line = substr($0, length(proj) + 3)
                  output[proj] = (output[proj] == "" ? line : output[proj] "\n" line)
                  if (/Tests +[0-9]+ passed/ && !/failed/) failed[proj] = 0
                }
              }
            }
            END {
              print "## Test Results\n"
              pass_count = 0
              fail_count = 0
              for (proj in is_test_target) {
                if (!is_test_target[proj]) continue
                status = (failed[proj] ? "❌" : "✅")
                printf "<details>\n<summary>%s %s:test</summary>\n\n```\n%s\n```\n\n</details>\n\n", status, proj, output[proj]
                if (failed[proj]) fail_count++; else pass_count++
              }
              if (pass_count == 0 && fail_count == 0) {
                printf "---\n**Summary:** No tests were run\n"
              } else {
                printf "---\n**Summary:** %d passed, %d failed\n", pass_count, fail_count
              }
            }
          ' >> summary.md

      - name: Comment on PR with test results
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: summary.md

  update-comment-on-cancel:
    name: Update comment on cancellation
    runs-on: ubuntu-latest
    needs: integration-tests
    if: cancelled()
    permissions:
      pull-requests: write
    steps:
      - name: Update sticky comment to cancelled
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          message: |
            ## 🚫 Integration tests were cancelled
