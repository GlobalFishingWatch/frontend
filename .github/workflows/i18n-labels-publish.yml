name: i18n-labels 🚀 to dev|latest

on:
  push:
    branches:
      - develop
    paths:
      - 'libs/i18n-labels/**'
      # Exclude to prevent infinite loop
      - '!libs/i18n-labels/package.json'
      - '!libs/i18n-labels/CHANGELOG.md'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PA_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Setup Git
        run: |
          git config user.name "Github Action"
          git config user.email "action@github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lib Changes
        shell: bash
        run: |
          pnpm affected:libs
          LIB_AFFECTED=$(cat affected-libs.txt)
          echo LIB_AFFECTED: $LIB_AFFECTED
          if [[ $LIB_AFFECTED == 'i18n-labels' ]]; then
            I18N_LABELS_AFFECTED="true"
          else
            I18N_LABELS_AFFECTED="false"
          fi
          echo "i18n-labels-affected=$I18N_LABELS_AFFECTED" >> $GITHUB_OUTPUT
        id: lib-changes

      - name: Bump version
        if: ${{ steps.lib-changes.outputs.i18n-labels-affected == 'true' }}
        shell: bash
        run: pnpm exec nx version i18n-labels

      - name: Tag i18n-labels@latest
        if: steps.lib-changes.outputs.i18n-labels-affected == 'true'
        shell: bash
        run: git tag -f i18n-labels@latest

      - name: Push changes
        if: steps.lib-changes.outputs.i18n-labels-affected == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GH_PA_TOKEN }}
          branch: ${{ github.ref }}
          force: true
          tags: true

      - name: Publish to NPM
        if: steps.lib-changes.outputs.i18n-labels-affected == 'true'
        shell: bash
        run: pnpm exec nx publish i18n-labels
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Purge jsdelivr cache
        if: steps.lib-changes.outputs.i18n-labels-affected == 'true'
        shell: bash
        run: pnpm exec nx purge i18n-labels
