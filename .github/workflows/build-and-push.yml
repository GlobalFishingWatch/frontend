name: Build and Push to Artifact Registry

on:
  push:
    branches:
      - feat/building-in-ga

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: us-central1-docker.pkg.dev
  GCP_PROJECT: gfw-int-infrastructure
  AR_REPOSITORY: frontend

jobs:
  detect-affected:
    name: Detect Affected Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.affected.outputs.apps }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Get affected apps
        id: affected
        run: |
          set -euo pipefail

          AFFECTED=$(pnpm exec nx show projects \
            --affected \
            --base=HEAD~1 \
            --head=HEAD \
            --type app \
            --exclude='linting,port-labeler,*-e2e' \
            --plain | grep -E '^[a-zA-Z][a-zA-Z0-9_-]*$' || true)

          APPS=()
          for app in $AFFECTED; do
            if [ -f "apps/$app/Dockerfile" ]; then
              APPS+=("$app")
            fi
          done

          APPS_JSON=$(printf '%s\n' "${APPS[@]+"${APPS[@]}"}" | jq -R . | jq -sc .)
          echo "apps=$APPS_JSON" >> $GITHUB_OUTPUT

          if [ "$APPS_JSON" = "[]" ]; then
            echo "No affected apps with a Dockerfile found — skipping build"
          else
            echo "Affected apps to build: $APPS_JSON"
          fi

  build-and-push:
    name: Build and Push / ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-affected
    if: needs.detect-affected.outputs.apps != '[]'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-affected.outputs.apps) }}
      fail-fast: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch build secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            SENTRY_AUTH_TOKEN:projects/706952489382/secrets/FISHING_MAP_SENTRY_AUTH_TOKEN/versions/latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.AR_REPOSITORY }}/${{ matrix.app }}:testing-action
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            VITE_API_GATEWAY=https://gateway.api.dev.globalfishingwatch.org
            VITE_API_VERSION=v3
            VITE_GOOGLE_MEASUREMENT_ID=G-R3PWRQW70G
            VITE_GOOGLE_TAG_MANAGER_ID=GTM-KK5ZFST
            VITE_USE_LOCAL_DATASETS=false
            VITE_USE_LOCAL_DATAVIEWS=false
            VITE_WORKSPACE_ENV=development
            VITE_REPORT_DAYS_LIMIT=366
            VITE_PIPE_DATASET_VERSION=4
            SENTRY_AUTH_TOKEN=${{ steps.secrets.outputs.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
